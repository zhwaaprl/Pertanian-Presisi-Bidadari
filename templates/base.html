<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AgroForcast{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header>
    <div class="container">
      <h1>🌱 AgroForcast</h1>
      <p>Pantau, prediksi, dan optimalkan pertumbuhan tanaman dengan teknologi AI</p>
      <nav>
        <a href="{{ url_for('index') }}">🏠 Beranda</a>
        <a href="{{ url_for('index') }}#petunjuk" style="opacity: 0.8;">📖 Panduan</a>
      </nav>
    </div>
  </header>
  <main class="container">{% block content %}{% endblock %}</main>
  <footer>
    <div class="container">
      <p>&copy; 2026 AgroForcast - Platform Pertanian Berbasis AI | Optimasi Tanaman Otomatis</p>
    </div>
  </footer>
</body>
</html>
